<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FDIC Class Planner</title>
<style>
body { font-family: Arial; margin:0; background:#111; color:#fff; }
header { padding:10px; text-align:center; background:#222; }
.tabs { display:flex; }
.tab { flex:1; padding:10px; text-align:center; cursor:pointer; background:#333; }
.tab.active { background:#555; }
.content { display:none; padding:10px; }
.content.active { display:block; }

.card { background:#1c1c1c; margin-bottom:10px; padding:10px; border-radius:8px; }
.time { font-size:12px; opacity:.7; }

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#007bff;
  color:white;
  font-size:16px;
}

.choice-btn {
  margin-top:5px;
  background:#444;
}
.choice-btn.selected {
  background:#28a745;
}
</style>
</head>
<body>

<header>
<h2>FDIC Class Planner</h2>
</header>

<div class="tabs">
<div class="tab active" onclick="showTab(0)">Select</div>
<div class="tab" onclick="showTab(1)">Time Slots</div>
<div class="tab" onclick="showTab(2)">Final</div>
</div>

<!-- TAB 1 -->
<div class="content active" id="tab0"></div>

<!-- TAB 2 -->
<div class="content" id="tab1"></div>

<!-- TAB 3 -->
<div class="content" id="tab2"></div>

<script>
// SAMPLE DATA (you can expand this)
const classes = [
{ title:"360 Leadership", time:"8:00 AM" },
{ title:"Active Shooter Response", time:"8:00 AM" },
{ title:"Advanced Auto Extrication", time:"8:00 AM" },
{ title:"Buddy to Boss Leadership", time:"8:00 AM" },

{ title:"The Grab Analysis", time:"1:00 PM" },
{ title:"Whole Blood in EMS", time:"1:00 PM" },
{ title:"Residential Playbook", time:"1:00 PM" },

{ title:"Andragogy of Simulation", time:"3:00 PM" },
{ title:"Talking Rigs", time:"3:00 PM" }
];

let selected = new Set();
let grouped = {};
let finalChoices = {};

// ---------- TAB SWITCH ----------
function showTab(i){
  document.querySelectorAll(".tab").forEach((t,idx)=>{
    t.classList.toggle("active", idx===i);
  });
  document.querySelectorAll(".content").forEach((c,idx)=>{
    c.classList.toggle("active", idx===i);
  });

  if(i===1) buildGrouped();
  if(i===2) buildFinal();
}

// ---------- TAB 1 ----------
function buildList(){
  const container = document.getElementById("tab0");
  container.innerHTML = "";

  classes.forEach((c,i)=>{
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      <div><b>${c.title}</b></div>
      <div class="time">${c.time}</div>
      <input type="checkbox" onchange="toggleSelect(${i})">
    `;
    container.appendChild(div);
  });

  container.innerHTML += `<button onclick="showTab(1)">Next →</button>`;
}

function toggleSelect(i){
  if(selected.has(i)) selected.delete(i);
  else selected.add(i);
}

// ---------- TAB 2 ----------
function buildGrouped(){
  grouped = {};
  selected.forEach(i=>{
    const c = classes[i];
    if(!grouped[c.time]) grouped[c.time] = [];
    grouped[c.time].push({ ...c, index:i });
  });

  const container = document.getElementById("tab1");
  container.innerHTML = "";

  Object.keys(grouped).forEach(time=>{
    const div = document.createElement("div");
    div.className="card";

    let html = `<b>${time}</b>`;
    grouped[time].forEach(c=>{
      html += `
      <div>
        <button class="choice-btn" onclick="choose('${time}', ${c.index}, this)">
          ${c.title}
        </button>
      </div>`;
    });

    div.innerHTML = html;
    container.appendChild(div);
  });

  container.innerHTML += `<button onclick="showTab(2)">Next →</button>`;
}

function choose(time, index, el){
  finalChoices[time] = index;

  // reset buttons in that group
  const parent = el.parentElement.parentElement;
  parent.querySelectorAll(".choice-btn").forEach(b=>b.classList.remove("selected"));

  el.classList.add("selected");
}

// ---------- TAB 3 ----------
function buildFinal(){
  const container = document.getElementById("tab2");
  container.innerHTML = "";

  Object.keys(finalChoices).forEach(time=>{
    const c = classes[finalChoices[time]];
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      <b>${c.title}</b>
      <div class="time">${time}</div>
    `;
    container.appendChild(div);
  });
}

// INIT
buildList();
</script>

</body>
</html>
